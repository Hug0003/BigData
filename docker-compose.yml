version: '3.8'

services:
  # Base de données PostgreSQL
  postgres:
    image: postgres:15
    container_name: bigdata-postgres
    restart: always
    environment:
      TZ: ${TZ:-Europe/Paris}
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-admin} -d ${POSTGRES_DB:-postgres}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  # Serveur MinIO (API + Console)
  minio:
    image: minio/minio
    container_name: bigdata-minio
    restart: always
    ports:
      - "9000:9000" # API S3
      - "9001:9001" # Interface Console
    environment:
      TZ: ${TZ:-Europe/Paris}
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY:-minioadmin}
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  # Exporteur de métriques pour Prometheus
  exporter:
    build:
      context: .
      dockerfile: Dockerfile-exporter
    container_name: bigdata-exporter
    restart: always
    ports:
      - "8000:8000"
    environment:
      - TZ=${TZ:-Europe/Paris}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-raw-api-data}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - METRICS_INTERVAL=${METRICS_INTERVAL:-30}
    depends_on:
      postgres:
        condition: service_healthy

  # Prometheus pour collecter les métriques
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    environment:
      - TZ=${TZ:-Europe/Paris}
    depends_on:
      - exporter

  # Grafana pour la visualisation
  grafana:
    image: grafana/grafana-enterprise
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3050:3000"
    environment:
      - TZ=${TZ:-Europe/Paris}
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - prometheus

  # Dashboard Streamlit
  dashboard:
    build:
      context: .
      dockerfile: Dockerfile-dashboard
    container_name: bigdata-dashboard
    restart: always
    ports:
      - "8501:8501"
    environment:
      - TZ=${TZ:-Europe/Paris}
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
    volumes:
      - .:/app
    working_dir: /app
    command: streamlit run dashboard.py --server.port=8501 --server.address=0.0.0.0 --server.headless=true --server.enableCORS=false --server.enableXsrfProtection=false --server.enableWebsocketCompression=false --server.fileWatcherType=none
    depends_on:
      postgres:
        condition: service_healthy

  # Airflow pour l'orchestration
  airflow:
    build:
      context: .
      dockerfile: Dockerfile-airflow
    container_name: airflow
    restart: always
    ports:
      - "8081:8080"
    environment:
      - TZ=${TZ:-Europe/Paris}
      - AIRFLOW__CORE__DEFAULT_TIMEZONE=Europe/Paris
      - AIRFLOW__CORE__EXECUTOR=LocalExecutor
      - AIRFLOW__DATABASE__SQL_ALCHEMY_CONN=postgresql+psycopg2://${POSTGRES_USER:-admin}:${POSTGRES_PASSWORD:-admin123}@postgres:5432/${POSTGRES_DB:-postgres}
      - AIRFLOW__CORE__LOAD_EXAMPLES=false
      - AIRFLOW__CORE__FERNET_KEY=${AIRFLOW__CORE__FERNET_KEY}
      - _AIRFLOW_WWW_USER_USERNAME=${AIRFLOW_USER:-admin}
      - _AIRFLOW_WWW_USER_PASSWORD=${AIRFLOW_PASSWORD:-admin}
      - PYTHONPATH=/opt/airflow/project
      - POSTGRES_USER=${POSTGRES_USER:-admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-admin123}
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-postgres}
      - MINIO_ENDPOINT=minio:9000
      - MINIO_ACCESS_KEY=${MINIO_ACCESS_KEY:-minioadmin}
      - MINIO_SECRET_KEY=${MINIO_SECRET_KEY:-minioadmin}
      - MINIO_BUCKET_NAME=${MINIO_BUCKET_NAME:-raw-api-data}
      - MINIO_SECURE=${MINIO_SECURE:-false}
      - GEOAPIFY_API_KEY=${GEOAPIFY_API_KEY}
      - OPENSKY_USERNAME=${OPENSKY_USERNAME}
      - OPENSKY_PASSWORD=${OPENSKY_PASSWORD}
    volumes:
      - ./dags:/opt/airflow/dags
      - .:/opt/airflow/project
    command: >
      bash -c " airflow db init && airflow users create --username ${AIRFLOW_USER:-admin} --password ${AIRFLOW_PASSWORD:-admin} --firstname Admin --lastname User --role Admin --email admin@example.com || true && airflow webserver & airflow scheduler & airflow triggerer"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
  minio_data:
